<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soirée collège — Inscription encadrement</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }
.container { max-width: 700px; margin: 0 auto; padding: 2rem 1rem; }
h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
.subtitle { font-size: 14px; color: #666; margin-bottom: 1.5rem; }
.section-title { font-size: 12px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.stat-bar { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
.stat { background: white; border-radius: 10px; border: 0.5px solid #e0e0d8; padding: 0.75rem 1rem; flex: 1; text-align: center; }
.stat-val { font-size: 22px; font-weight: 500; }
.stat-lbl { font-size: 12px; color: #888; margin-top: 2px; }
.roles-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
.role-card { background: white; border: 0.5px solid #e0e0d8; border-radius: 12px; padding: 1rem 1.25rem; cursor: pointer; transition: border-color 0.15s; }
.role-card:hover { border-color: #bbb; }
.role-card.selected { border-color: #378ADD; background: #EBF4FC; }
.role-card.selected-deco { border-color: #1D9E75; background: #E1F5EE; }
.role-card.full { opacity: 0.6; cursor: not-allowed; }
.role-header { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
.role-icon { font-size: 20px; }
.role-name { font-size: 15px; font-weight: 500; }
.role-desc { font-size: 12px; color: #888; margin-bottom: 10px; line-height: 1.5; padding-left: 30px; }
.progress-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: #888; }
.progress-bar { height: 4px; background: #eee; border-radius: 2px; overflow: hidden; margin-top: 4px; }
.progress-fill { height: 100%; border-radius: 2px; background: #378ADD; transition: width 0.3s; }
.progress-fill.full { background: #E24B4A; }
.badge { font-size: 11px; padding: 2px 10px; border-radius: 99px; }
.badge-full { background: #FCEBEB; color: #A32D2D; }
.badge-ok { background: #EAF3DE; color: #3B6D11; }
.badge-unlimited { background: #FAEEDA; color: #854F0B; }
.badge-unlimited-deco { background: #E1F5EE; color: #0F6E56; }
.badge-selected { background: #E6F1FB; color: #185FA5; }
.badge-selected-deco { background: #E1F5EE; color: #0F6E56; }
.names-list { font-size: 12px; color: #888; margin-top: 8px; min-height: 18px; }
.name-tag { display: inline-block; background: #f0f0ee; border-radius: 4px; padding: 2px 8px; margin: 2px 2px 0 0; line-height: 1.6; }
.name-tag.me { background: #E6F1FB; color: #185FA5; }
.name-tag.me-deco { background: #E1F5EE; color: #0F6E56; }
.name-time { font-size: 11px; color: #aaa; display: block; }
.name-autre { font-size: 11px; color: #aaa; display: block; font-style: italic; }
.form-card { background: white; border: 0.5px solid #e0e0d8; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
.form-card h2 { font-size: 16px; font-weight: 500; margin-bottom: 1rem; }
.field { margin-bottom: 1rem; }
.field label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; }
.field input[type=text], .field input[type=time] { width: 100%; padding: 9px 12px; font-size: 14px; border: 0.5px solid #ccc; border-radius: 8px; background: white; color: #1a1a1a; font-family: inherit; }
.field input:focus { outline: none; border-color: #378ADD; box-shadow: 0 0 0 2px rgba(55,138,221,0.15); }
.time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.time-sub { font-size: 12px; color: #aaa; display: block; margin-bottom: 4px; }
.btn-primary { width: 100%; padding: 11px; font-size: 14px; font-weight: 500; background: #185FA5; color: white; border: none; border-radius: 8px; cursor: pointer; font-family: inherit; transition: background 0.15s; }
.btn-primary:hover { background: #0C447C; }
.btn-primary:disabled { background: #e5e5e3; color: #aaa; cursor: not-allowed; }
.btn-edit { padding: 6px 14px; font-size: 13px; background: transparent; border: 0.5px solid #ccc; border-radius: 8px; cursor: pointer; color: #666; font-family: inherit; }
.btn-edit:hover { background: #f5f5f3; }
.alert { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 1rem; }
.alert-success { background: #EAF3DE; color: #3B6D11; border: 0.5px solid #C0DD97; }
.alert-error { background: #FCEBEB; color: #A32D2D; border: 0.5px solid #F7C1C1; }
.alert-info { background: #E6F1FB; color: #185FA5; border: 0.5px solid #B5D4F4; }
.my-badge { background: #E6F1FB; border: 0.5px solid #B5D4F4; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; font-size: 14px; color: #185FA5; }
.my-badge.deco { background: #E1F5EE; border-color: #9FE1CB; color: #0F6E56; }
.time-chip { display: inline-block; background: white; border: 0.5px solid #B5D4F4; border-radius: 4px; padding: 1px 7px; font-size: 12px; margin-left: 6px; }
.hint-box { background: #E6F1FB; color: #185FA5; border: 0.5px solid #B5D4F4; border-radius: 8px; padding: 9px 13px; font-size: 13px; margin-bottom: 1rem; }
.loading { text-align: center; color: #aaa; font-size: 14px; padding: 2rem 0; }

/* ====== INSTRUCTIONS HÉBERGEMENT ====== */
.setup-box { background: #fffbe6; border: 1px solid #f5d020; border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 2rem; }
.setup-box h2 { font-size: 15px; font-weight: 500; margin-bottom: 0.75rem; color: #7a5c00; }
.setup-box p, .setup-box li { font-size: 13px; color: #7a5c00; line-height: 1.6; }
.setup-box ol { padding-left: 1.2rem; }
.setup-box code { background: rgba(0,0,0,0.06); padding: 1px 5px; border-radius: 4px; font-family: monospace; font-size: 12px; }
.setup-box a { color: #185FA5; }
.setup-box .hide-btn { margin-top: 0.75rem; font-size: 12px; cursor: pointer; color: #7a5c00; background: none; border: 0.5px solid #c9a800; border-radius: 6px; padding: 4px 10px; font-family: inherit; }
</style>
</head>
<body>
<div class="container">


<h1>🎉 Soirée collège — organisation</h1>
<p class="subtitle">Inscrivez-vous pour un ou plusieurs rôles et indiquez vos horaires de présence.</p>

<div id="stats" class="stat-bar">
  <div class="loading">Chargement…</div>
</div>

<div id="myBadge" style="display:none"></div>
<div id="alert" style="display:none" class="alert"></div>

<div class="section-title">👥 Encadrement de la soirée</div>
<div id="roleCards" class="roles-grid"></div>

<div class="section-title">🎨 Installation et décoration</div>
<div id="decoCard" class="roles-grid" style="grid-template-columns:1fr;"></div>

<div class="section-title">🧹 Rangement de la salle</div>
<div id="rangementCard" class="roles-grid" style="grid-template-columns:1fr;"></div>

<div class="form-card">
  <h2>✏️ Votre inscription</h2>
  <div class="field">
    <label for="inputName">Prénom et nom</label>
    <input type="text" id="inputName" placeholder="ex : Marie Dupont" autocomplete="off">
  </div>
  <div class="field">
    <label>Horaires de présence</label>
    <div class="time-row">
      <div>
        <span class="time-sub">Arrivée</span>
        <input type="time" id="inputStart" value="18:00">
      </div>
      <div>
        <span class="time-sub">Départ</span>
        <input type="time" id="inputEnd" value="22:00">
      </div>
    </div>
  </div>
  <div id="autreField" class="field" style="display:none">
    <label for="inputAutre">Précisez votre rôle</label>
    <input type="text" id="inputAutre" placeholder="ex : Sono, Transport…" autocomplete="off">
  </div>
  <div id="roleHint" style="display:none" class="hint-box"></div>
  <button class="btn-primary" id="btnSubmit" onclick="handleSubmit()">Sélectionnez un rôle ci-dessus</button>
</div>

</div>

<script>
// =====================================================
// REMPLACEZ CETTE URL PAR CELLE DE VOTRE BASE FIREBASE
const FIREBASE_URL = "https://balpromo-2026-default-rtdb.europe-west1.firebasedatabase.app";
// =====================================================

const ROLES = [
  { id: "accueil", name: "Accueil des élèves", icon: "🚪", max: 4, group: "encadrement",
    desc: "Vérifier le ticket d'entrée. À la sortie, vérifier la présence des parents avant le départ de l'élève et faire signer les parents. (20h-23h)" },
  { id: "surveillance", name: "Surveillance générale", icon: "👁️", max: 5, group: "encadrement",
    desc: "Assurer la surveillance à l'intérieur de la salle pendant toute la durée de la soirée. (20h-23h)" },
  { id: "buffet", name: "Restauration / buffet", icon: "🍽️", max: 4, group: "encadrement",
    desc: "Installer et gérer le buffet, veiller au réapprovisionnement et au rangement en fin de soirée. (20h-??h)" },
  { id: "securite", name: "Surveillance des abords", icon: "🛡️", max: 3, group: "encadrement",
    desc: "Surveiller les abords de la salle, contrôler les entrées/sorties et assurer la sécurité extérieure. (20h-23h)" },
  { id: "autre", name: "Autre", icon: "✨", max: null, group: "encadrement",
    desc: "Tout autre rôle utile à la soirée. Précisez votre contribution dans le champ prévu." },
  { id: "deco", name: "Installation et décoration", icon: "🎨", max: null, group: "deco",
    desc: "Participer à l'installation de la salle et à sa décoration avant la soirée. Mise en place du buffet. Places illimitées, venez nombreux ! (14h-20h)" },
  { id: "rangement", name: "Rangement de la salle", icon: "🧹", max: null, group: "rangement",
    desc: "Participer au rangement et au nettoyage de la salle après la soirée. Places illimitées.(22h30 - ??h" },
];

let data = { inscriptions: [] };
let selectedRole = null;
let decoSelected = false;
let rangementSelected = false;
let myName = null;
let myId = null;
let pollInterval = null;

// Génère ou récupère l'ID unique du navigateur
try { myId = localStorage.getItem("soiree_my_id"); } catch(e) {}

async function apiFetch(path, method = "GET", body = null) {
  const url = FIREBASE_URL + path;
  const opts = { method, headers: { "Content-Type": "application/json" } };
  if (body !== null) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  if (!r.ok) throw new Error("Firebase error " + r.status);
  return r.json();
}

async function loadData() {
  try {
    const raw = await apiFetch("/inscriptions.json");
    data.inscriptions = raw ? Object.values(raw) : [];
  } catch(e) {
    data.inscriptions = [];
    showAlert("Impossible de charger les données. Vérifiez la configuration Firebase.", "error");
  }
  if (myId) {
    const me = data.inscriptions.find(i => i.id === myId);
    if (me) {
      myName = me.name;
      selectedRole = me.role || null;
      decoSelected = me.deco || false;
      rangementSelected = me.rangement || false;
      document.getElementById("inputName").value = me.name;
      if (me.start) document.getElementById("inputStart").value = me.start;
      if (me.end) document.getElementById("inputEnd").value = me.end;
      if (me.autre) document.getElementById("inputAutre").value = me.autre;
      toggleAutreField(me.role === "autre");
    }
  }
  render();
}

async function saveEntry(entry) {
  await apiFetch("/inscriptions/" + entry.id + ".json", "PUT", entry);
}

function countRole(roleId) { return data.inscriptions.filter(i => i.role === roleId).length; }
function countDeco() { return data.inscriptions.filter(i => i.deco).length; }
function membersForRole(roleId) { return data.inscriptions.filter(i => i.role === roleId); }
function membersForDeco() { return data.inscriptions.filter(i => i.deco); }
function membersForRangement() { return data.inscriptions.filter(i => i.rangement); }
function countRangement() { return data.inscriptions.filter(i => i.rangement).length; }
function toggleAutreField(show) { document.getElementById("autreField").style.display = show ? "block" : "none"; }

function render() { renderStats(); renderMyBadge(); renderRoles(); renderDeco(); renderRangement(); renderForm(); }

function renderStats() {
  const total = data.inscriptions.length;
  const totalMax = ROLES.filter(r => r.max && r.group === "encadrement").reduce((a, r) => a + r.max, 0);
  const filled = ROLES.filter(r => r.max && r.group === "encadrement" && countRole(r.id) >= r.max).length;
  const lim = ROLES.filter(r => r.max && r.group === "encadrement").length;
  document.getElementById("stats").innerHTML = `
    <div class="stat"><div class="stat-val">${total}</div><div class="stat-lbl">inscrits</div></div>
    <div class="stat"><div class="stat-val">${totalMax}</div><div class="stat-lbl">places encadrement</div></div>
    <div class="stat"><div class="stat-val">${filled}/${lim}</div><div class="stat-lbl">rôles complets</div></div>
  `;
}

function renderMyBadge() {
  const el = document.getElementById("myBadge");
  if (!myId) { el.style.display = "none"; return; }
  const me = data.inscriptions.find(i => i.id === myId);
  if (!me) { el.style.display = "none"; return; }
  const role = ROLES.find(r => r.id === me.role);
  const horaire = (me.start && me.end) ? `${me.start} – ${me.end}` : "";
  const rLabel = me.role === "autre" && me.autre ? `Autre — ${me.autre}` : role ? role.name : "";
  const parts = [rLabel, me.deco ? "Installation et décoration" : ""].filter(Boolean);
  el.style.display = "flex";
  el.className = `my-badge${me.deco && !me.role ? " deco" : ""}`;
  el.innerHTML = `
    <div><strong>${me.name}</strong> — ${parts.join(" + ")}${horaire ? `<span class="time-chip">🕐 ${horaire}</span>` : ""}</div>
    <button class="btn-edit" onclick="editMe()">✏️ Modifier</button>
  `;
}

function renderRoles() {
  const container = document.getElementById("roleCards");
  container.innerHTML = ROLES.filter(r => r.group === "encadrement").map(role => {
    const count = countRole(role.id);
    const members = membersForRole(role.id);
    const isFull = role.max !== null && count >= role.max;
    const isSelected = selectedRole === role.id;
    const isUnlim = role.max === null;
    const pct = isUnlim ? 0 : Math.round((count / role.max) * 100);
    const badge = isFull ? `<span class="badge badge-full">Complet</span>`
      : isSelected ? `<span class="badge badge-selected">Votre choix</span>`
      : isUnlim ? `<span class="badge badge-unlimited">∞ Places libres</span>`
      : `<span class="badge badge-ok">${role.max - count} place${role.max - count > 1 ? "s" : ""} dispo.</span>`;
    const tags = members.map(m => {
      const isMe = m.id === myId;
      const h = (m.start && m.end) ? `${m.start}–${m.end}` : m.start ? `dès ${m.start}` : "";
      return `<span class="name-tag${isMe ? " me" : ""}">${m.name}${isMe ? " (vous)" : ""}${h ? `<span class="name-time">🕐 ${h}</span>` : ""}${m.autre && m.role === "autre" ? `<span class="name-autre">${m.autre}</span>` : ""}</span>`;
    }).join("");
    return `<div class="role-card${isFull && !isSelected ? " full" : ""}${isSelected ? " selected" : ""}"
      onclick="selectRole('${role.id}',${isFull})" role="button" tabindex="0" aria-pressed="${isSelected}">
      <div class="role-header"><span class="role-icon">${role.icon}</span><span class="role-name">${role.name}</span></div>
      <p class="role-desc">${role.desc}</p>
      <div class="progress-row"><span>${count} inscrit${count>1?"s":""}${isUnlim?"":" / "+role.max}</span>${badge}</div>
      ${!isUnlim ? `<div class="progress-bar"><div class="progress-fill${isFull?" full":""}" style="width:${pct}%"></div></div>` : ""}
      <div class="names-list">${tags || '<em style="font-size:12px;color:#bbb">Personne pour l\'instant</em>'}</div>
    </div>`;
  }).join("");
}

function renderDeco() {
  const role = ROLES.find(r => r.id === "deco");
  const count = countDeco();
  const members = membersForDeco();
  const isSelected = decoSelected;
  const badge = isSelected ? `<span class="badge badge-selected-deco">Votre choix</span>`
    : `<span class="badge badge-unlimited-deco">∞ Places libres</span>`;
  const tags = members.map(m => {
    const isMe = m.id === myId;
    const h = (m.start && m.end) ? `${m.start}–${m.end}` : m.start ? `dès ${m.start}` : "";
    return `<span class="name-tag${isMe ? " me-deco" : ""}">${m.name}${isMe?" (vous)":""}${h?`<span class="name-time">🕐 ${h}</span>`:""}</span>`;
  }).join("");
  document.getElementById("decoCard").innerHTML = `
    <div class="role-card${isSelected ? " selected-deco" : ""}" onclick="toggleDeco()" role="button" tabindex="0" aria-pressed="${isSelected}">
      <div class="role-header"><span class="role-icon">${role.icon}</span><span class="role-name">${role.name}</span></div>
      <p class="role-desc">${role.desc}</p>
      <div class="progress-row"><span>${count} inscrit${count>1?"s":""}</span>${badge}</div>
      <div class="names-list">${tags || '<em style="font-size:12px;color:#bbb">Personne pour l\'instant</em>'}</div>
    </div>`;
}


function renderRangement() {
  const role = ROLES.find(r => r.id === "rangement");
  const count = countRangement();
  const members = membersForRangement();
  const isSelected = rangementSelected;
  const badge = isSelected ? `<span class="badge badge-selected-deco">Votre choix</span>`
    : `<span class="badge badge-unlimited-deco">∞ Places libres</span>`;
  const tags = members.map(m => {
    const isMe = m.id === myId;
    return `<span class="name-tag${isMe ? " me-deco" : ""}">${m.name}${isMe?" (vous)":""}</span>`;
  }).join("");
  document.getElementById("rangementCard").innerHTML = `
    <div class="role-card${isSelected ? " selected-deco" : ""}" onclick="toggleRangement()">
      <div class="role-header"><span class="role-icon">${role.icon}</span><span class="role-name">${role.name}</span></div>
      <p class="role-desc">${role.desc}</p>
      <div class="progress-row"><span>${count} inscrit${count>1?"s":""}</span>${badge}</div>
      <div class="names-list">${tags || '<em style="font-size:12px;color:#bbb">Personne pour l\'instant</em>'}</div>    </div>`;
}

function toggleRangement() {
  rangementSelected = !rangementSelected;
  renderRangement(); renderForm();
}

function renderForm() {
  const hint = document.getElementById("roleHint");
  const btn = document.getElementById("btnSubmit");
  const parts = [];
  if (selectedRole) { const r = ROLES.find(x => x.id === selectedRole); if(r) parts.push(r.name); }
  if (decoSelected) parts.push("Installation et décoration");
  if (rangementSelected) parts.push("Rangement de la salle");
  if (rangementSelected) parts.push("Rangement de la salle");
  if (parts.length > 0) {
    hint.style.display = "block";
    hint.textContent = "ℹ️ Sélectionné : " + parts.join(" + ");
    btn.textContent = myId ? "Modifier mon inscription" : "S'inscrire";
    btn.disabled = false;
  } else {
    hint.style.display = "none";
    btn.textContent = "Sélectionnez au moins un rôle ci-dessus";
    btn.disabled = true;
  }
}

function selectRole(roleId, isFull) {
  if (isFull && selectedRole !== roleId) return;
  selectedRole = selectedRole === roleId ? null : roleId;
  toggleAutreField(selectedRole === "autre");
  renderRoles(); renderForm();
}

function toggleDeco() {
  decoSelected = !decoSelected;
  renderDeco(); renderForm();
}

function editMe() { showAlert("Modifiez vos choix ou vos horaires, puis confirmez.", "info"); }

async function handleSubmit() {
  const name = document.getElementById("inputName").value.trim();
  const start = document.getElementById("inputStart").value;
  const end = document.getElementById("inputEnd").value;
  const autre = document.getElementById("inputAutre").value.trim();
  if (!name) { showAlert("Merci d'entrer votre prénom et nom.", "error"); return; }
  if (!selectedRole && !decoSelected) { showAlert("Merci de sélectionner au moins un rôle.", "error"); return; }
  if (selectedRole === "autre" && !autre) { showAlert("Merci de préciser votre rôle.", "error"); return; }
  if (start && end && start >= end) { showAlert("L'heure de départ doit être après l'heure d'arrivée.", "error"); return; }
  if (selectedRole) {
    const role = ROLES.find(r => r.id === selectedRole);
    const count = countRole(selectedRole);
    const isMe = myId && data.inscriptions.find(i => i.id === myId);
    if (!isMe && role.max !== null && count >= role.max) { showAlert("Ce rôle est complet. Choisissez-en un autre.", "error"); return; }
  }
  if (!myId) {
    myId = Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    try { localStorage.setItem("soiree_my_id", myId); } catch(e) {}
  }
  const entry = { id: myId, name, role: selectedRole || null, start, end, autre: selectedRole === "autre" ? autre : "", deco: decoSelected, rangement: rangementSelected };
  const idx = data.inscriptions.findIndex(i => i.id === myId);
  if (idx >= 0) data.inscriptions[idx] = entry; else data.inscriptions.push(entry);
  myName = name;
  try {
    await saveEntry(entry);
    const rLabel = selectedRole ? (selectedRole === "autre" ? `Autre — ${autre}` : ROLES.find(r=>r.id===selectedRole).name) : "";
    const parts = [rLabel, decoSelected ? "Installation et décoration" : ""].filter(Boolean);
    showAlert(`Inscription enregistrée — ${name} : ${parts.join(" + ")}`, "success");
    render();
  } catch(e) {
    showAlert("Erreur lors de l'enregistrement. Vérifiez la configuration Firebase.", "error");
  }
}

function showAlert(msg, type) {
  const el = document.getElementById("alert");
  el.className = `alert alert-${type}`;
  el.textContent = msg;
  el.style.display = "block";
  setTimeout(() => { el.style.display = "none"; }, 5000);
}

// Rafraîchissement toutes les 8 secondes
async function poll() {
  try {
    const raw = await apiFetch("/inscriptions.json");
    const fresh = raw ? Object.values(raw) : [];
    if (JSON.stringify(fresh) !== JSON.stringify(data.inscriptions)) {
      data.inscriptions = fresh;
      render();
    }
  } catch(e) {}
}

loadData().then(() => { pollInterval = setInterval(poll, 8000); });
</script>
</body>
</html>
